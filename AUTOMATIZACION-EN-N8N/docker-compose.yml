services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always

    ports:
      - "5679:5678"

    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: host.docker.internal
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: postgres
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: 1234

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: